<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 38 38" width="38" height="38">
  <rect width="38" height="38" rx="7" fill="#009639"/>
  <!-- NGINX-style: funnel / distributor shape -->
  <!-- Incoming single bar -->
  <rect x="3" y="16" width="9" height="6" rx="2" fill="#FFFFFF" opacity="0.95"/>
  <!-- Diamond/funnel shape -->
  <polygon points="16,12 22,12 24,19 22,26 16,26 14,19" fill="#FFFFFF" opacity="0.85"/>
  <!-- 3 outgoing bars -->
  <rect x="27" y="8"  width="8" height="5" rx="1.5" fill="#FFFFFF" opacity="0.9"/>
  <rect x="27" y="16.5" width="8" height="5" rx="1.5" fill="#FFFFFF" opacity="0.9"/>
  <rect x="27" y="25" width="8" height="5" rx="1.5" fill="#FFFFFF" opacity="0.9"/>
  <!-- Connectors -->
  <line x1="12" y1="19" x2="14" y2="19"  stroke="#FFFFFF" stroke-width="1.5" opacity="0.8"/>
  <line x1="24" y1="16" x2="27" y2="10.5" stroke="#FFFFFF" stroke-width="1.2" opacity="0.8"/>
  <line x1="24" y1="19" x2="27" y2="19"   stroke="#FFFFFF" stroke-width="1.2" opacity="0.8"/>
  <line x1="24" y1="22" x2="27" y2="27.5" stroke="#FFFFFF" stroke-width="1.2" opacity="0.8"/>
</svg>